<!DOCTYPE html>
<html>

<head>

    <title>Car Price Predictor</title>

    <style>

        body{
            font-family: Arial;
            background:#f2f2f2;
            text-align:center;
            padding:40px;
        }

        .box{
            background:white;
            width:400px;
            margin:auto;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        select,input{
            width:90%;
            padding:10px;
            margin:10px;
            border:1px solid gray;
            border-radius:5px;
        }

        button{
            padding:10px 20px;
            background:blue;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        h2{
            color:green;
        }

    </style>

</head>

<body>

<div class="box">

    <h1>🚗 Car Price Predictor</h1>

    <form method="POST">

        <!-- Car Model -->
        <select name="name" required>
            <option value="">Select Car Model</option>

            {% for model in car_models %}
            <option value="{{ model }}">
                {{ model }}
            </option>
            {% endfor %}

        </select>

        <!-- Company -->
        <select name="company" required>

            <option value="">Select Company</option>

            {% for company in companies %}
            <option value="{{ company }}">
                {{ company }}
            </option>
            {% endfor %}

        </select>

        <!-- KM Driven -->
        <input type="number"
               name="kms_driven"
               placeholder="Enter KM Driven"
               required>

        <!-- Fuel Type -->
        <select name="fuel_type" required>

            <option value="">Select Fuel Type</option>

            {% for fuel in fuel_types %}
            <option value="{{ fuel }}">
                {{ fuel }}
            </option>
            {% endfor %}

        </select>

        <br>

        <button type="submit">
            Predict Price
        </button>

    </form>

    <h2>{{ prediction }}</h2>

</div>

</body>

</html>
